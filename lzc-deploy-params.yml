params:
  - id: api_key
    type: string
    name: "API Key"
    description: "安装后访问 mem9 API 使用的固定 API Key。"
    optional: false
    default: "mem9-default-key"

  - id: tenant_name
    type: string
    name: "Tenant Name"
    description: "默认空间名称。"
    optional: false
    default: "Default Space"

  - id: ingest_mode
    type: string
    name: "Ingest Mode"
    description: "是否启用基于 LLM 的智能整理。"
    optional: false
    default: "raw"

  - id: llm_api_key
    type: string
    name: "LLM API Key"
    description: "智能整理模式需要的 LLM API Key。"
    optional: true
    hidden: true
    default: ""

  - id: llm_base_url
    type: string
    name: "LLM Base URL"
    description: "兼容 OpenAI 接口的基础地址，可留空。"
    optional: true
    default: ""

  - id: llm_model
    type: string
    name: "LLM Model"
    description: "智能整理使用的模型名。"
    optional: true
    default: "gpt-4o-mini"

